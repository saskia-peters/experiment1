<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jugendolympiade - Verwaltung</title>
    <link rel="stylesheet" href="shared/styles.css">
    <link rel="stylesheet" href="shared/components.css">
    <link rel="stylesheet" href="stations/stations.css">
    <link rel="stylesheet" href="evaluations/evaluations.css">
    <link rel="stylesheet" href="groups/groups.css">
</head>
<body>
    <div class="container">
        <div class="app-header">
            <h1>🎯 Jugendolympiade - Verwaltung</h1>
            <div class="status" id="status">Bereit. Bitte Excel-Datei laden.</div>
        </div>
        <div class="app-content">
            <div class="buttons">
                <div class="button-section">
                    <details class="category-dropdown" open>
                        <summary class="section-title">⚙️ Admin</summary>
                        <div class="button-group">
                            <button class="btn-load" onclick="openFileDialog()">Lade Excel Datei</button>
                            <button class="btn-backup" onclick="handleBackupDatabase()">Datenbank sichern</button>
                            <button class="btn-restore" onclick="handleRestoreDatabase()">Datenbank wiederherstellen</button>
                        </div>
                    </details>
                </div>
                <div class="button-section">
                    <details class="category-dropdown">
                        <summary class="section-title">📝 Daten</summary>
                        <div class="button-group">
                            <button class="btn-show" id="btnShow" onclick="handleShowGroups()" disabled>Gruppen</button>
                            <button class="btn-stations" id="btnStations" onclick="handleShowStations()" disabled>Ergebniseingabe</button>
                        </div>
                    </details>
                </div>
                <div class="button-section">
                    <details class="category-dropdown">
                        <summary class="section-title">📊 Ausgabe</summary>
                        <div class="button-group">
                            <button class="btn-pdf" id="btnPDF" onclick="handleGeneratePDF()" disabled>Gruppen-PDF erstellen</button>
                            <button class="btn-evaluation" id="btnEvaluation" onclick="handleEvaluation()" disabled>Auswertung nach Gruppen</button>
                            <button class="btn-ortsverband" id="btnOrtsverband" onclick="handleOrtsverbandEvaluation()" disabled>Auswertung nach Ortsverband</button>
                            <button class="btn-certificates" id="btnCertificates" onclick="handleGenerateCertificates()" disabled>Teilnehmer-Zertifikate</button>
                        </div>
                    </details>
                </div>
            </div>
            <div class="output" id="output">Gruppen werden hier angezeigt...</div>
            <div class="tabs" id="tabs" style="display: none;">
                <div class="tab-buttons" id="tabButtons"></div>
                <div id="tabContents"></div>
            </div>
        </div>
    </div>
    
    <script src="wails/runtime/runtime.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
